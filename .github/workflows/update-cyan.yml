name: Update CyAN satellite data

# CyAN publishes new weekly satellite data by COB each Monday.
# Run Tuesday mornings (UTC) to pick it up, plus allow manual runs.
on:
  schedule:
    - cron: '0 11 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CyAN data
        run: node scripts/fetch-cyan.mjs

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/cyan.json; then
            git add data/cyan.json
            git commit -m "Update CyAN satellite data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No change in CyAN data."
          fi
